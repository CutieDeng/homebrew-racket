# GENERATED CODE - DO NOT EDIT IN homebrew-racket.
# Source of truth: https://github.com/CutieDeng/package-racket
# Humans and LLM agents must change package-racket and regenerate; manual tap edits are not production-safe.

name: brew test-bot

on:
  pull_request:

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            test_formula: true
          - os: ubuntu-latest
            test_formula: true
            container: ghcr.io/homebrew/brew:main
          - os: ubuntu-24.04-arm
            test_formula: true
            container: ghcr.io/homebrew/brew:main
          - os: macos-15-intel
            test_formula: false
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax --tap=cutiedeng/racket

      - run: brew test-bot --only-formulae --testing-formulae=racket@9 --skip-dependents --root-url=https://github.com/CutieDeng/homebrew-racket/releases/download/v9.2.2
        if: matrix.test_formula

      - name: Upload bottles as artifact
        if: matrix.test_formula
        uses: actions/upload-artifact@v6
        with:
          name: bottles_${{ matrix.os }}
          path: |
            *.bottle.json
            *.bottle*.tar.gz
            **/*.bottle.json
            **/*.bottle*.tar.gz
          if-no-files-found: error
